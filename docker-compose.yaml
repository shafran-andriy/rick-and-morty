services:
  db:
  image: postgres
  volumes:
    - ./data/db:/var/lib/postgresql/data/
  env_file:
    - .env
  
  web:
    build: .
    command: >
    sh -c "python manage.py wait_for_db && 
          python manage.py migrate && 
          python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
  
  redis:
    image: "redis:alpine"
  

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: "celery -A rick_and_morty_api worker -l info"
    depends_on:
      - web
      - redis
      - db
    restart: on-failure
    env_file:
      - .env